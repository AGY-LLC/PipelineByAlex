# Reusable BUNDLE for a web app: test → deploy-vercel (gated).
name: web-app

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: "."
      deploy-ref:
        type: string
        default: "refs/heads/main"
      environment:
        type: string
        default: "production"
      health-url:
        type: string
        default: ""
    secrets:
      VERCEL_TOKEN:
        required: true
      VERCEL_ORG_ID:
        required: true
      VERCEL_PROJECT_ID:
        required: true

jobs:
  test:
    uses: agy/agy-ci/.github/workflows/node-test.yml@v1
    with:
      working-directory: ${{ inputs.working-directory }}
    secrets: inherit

  deploy:
    needs: test
    if: github.ref == inputs.deploy-ref
    uses: agy/agy-ci/.github/workflows/deploy-vercel.yml@v1
    with:
      working-directory: ${{ inputs.working-directory }}
      environment: ${{ inputs.environment }}
      prod: true
      health-url: ${{ inputs.health-url }}
    secrets: inherit
